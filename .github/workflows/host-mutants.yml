name: Host Mutants

on:
  workflow_dispatch:
    inputs:
      file:
        description: Optional file or directory filter passed to cargo-mutants --file
        required: false
        type: string
        default: ""

concurrency:
  group: host-mutants-manual
  cancel-in-progress: true

jobs:
  host-verify:
    name: Verify host build and tests
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-17

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: host-mutants
          cache-workspace-crates: "true"
          cache-on-failure: "false"

      - name: Run host tests with mutants profile
        shell: pwsh
        run: cargo test -p host --tests --profile mutants

  host-mutants:
    name: Run host cargo-mutants
    needs: host-verify
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      REPORT_DIR: mutants.out.host.ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-17

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: host-mutants
          cache-workspace-crates: "true"
          save-if: "false"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Prepare report directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:REPORT_DIR | Out-Null
          @(
            "workflow=${{ github.workflow }}"
            "run_id=${{ github.run_id }}"
            "run_attempt=${{ github.run_attempt }}"
            "ref=${{ github.ref }}"
            "sha=${{ github.sha }}"
            "input.file=${{ inputs.file }}"
          ) | Set-Content (Join-Path $env:REPORT_DIR "run-metadata.txt")

      - name: Run host mutants
        id: run_mutants
        continue-on-error: true
        shell: pwsh
        run: |
          $args = @(
            "run", "-p", "xtask", "--",
            "mutants",
            "--package", "host",
            "--",
            "--baseline=skip",
            "--in-place",
            "--timeout", "60",
            "--output", $env:REPORT_DIR
          )

          if ("${{ inputs.file }}".Trim().Length -gt 0) {
            $args += @("--file", "${{ inputs.file }}")
          }

          Write-Host "Running: cargo $($args -join ' ')"
          & cargo @args
          $code = $LASTEXITCODE
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0

      - name: Summarize report
        if: always()
        shell: pwsh
        run: |
          $reportRoot = Join-Path $env:REPORT_DIR "mutants.out"
          $summaryFile = Join-Path $env:REPORT_DIR "summary.md"

          function Count-Entries([string] $path) {
            if (-not (Test-Path $path)) {
              return 0
            }

            $lines = Get-Content $path | Where-Object { $_.Trim().Length -gt 0 }
            return @($lines).Count
          }

          $caught = Count-Entries (Join-Path $reportRoot "caught.txt")
          $missed = Count-Entries (Join-Path $reportRoot "missed.txt")
          $timeout = Count-Entries (Join-Path $reportRoot "timeout.txt")
          $unviable = Count-Entries (Join-Path $reportRoot "unviable.txt")

          $summary = @"
          ## Host mutants summary

          - File filter: `${{ inputs.file }}`
          - Exit code: `${{ steps.run_mutants.outputs.exit_code }}`
          - Caught: `$caught`
          - Missed: `$missed`
          - Timeout: `$timeout`
          - Unviable: `$unviable`

          Full report is uploaded as the `host-mutants-report` artifact.
          "@

          $summary = ($summary -split "`n" | ForEach-Object { $_.TrimEnd() }) -join "`n"
          $summary | Set-Content $summaryFile
          $summary | Add-Content $env:GITHUB_STEP_SUMMARY

      - name: Upload host mutants artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-mutants-report
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: warn
          compression-level: 9

      - name: Fail workflow on mutants failure
        if: always() && steps.run_mutants.outputs.exit_code != '0'
        shell: pwsh
        run: |
          $code = "${{ steps.run_mutants.outputs.exit_code }}"
          if ([string]::IsNullOrWhiteSpace($code)) {
            $code = "1"
          }

          exit [int]$code
