# cargo-mutants 配置
#
# 变异测试覆盖：
# - `vn-runtime`：纯逻辑层，默认全量参与
#
# 运行方式：
#   全量：cargo mutants -p vn-runtime
#   单文件：cargo mutants -p vn-runtime --file "vn-runtime/src/state.rs"
#   列出变异：cargo mutants --list -p vn-runtime

# ---------------------------------------------------------------------------
# 文件排除
# ---------------------------------------------------------------------------
exclude_globs = [
    # thiserror derive，无手写逻辑
    "vn-runtime/src/error.rs",
    # host-dioxus 前端（Dioxus RSX 组件 + 入口 + Debug HTTP server）：
    # 含渲染/事件处理逻辑，无对应单元测试，变异测试无法有效验证。
    "host-dioxus/src/main.rs",
    "host-dioxus/src/debug_server.rs",
    "host-dioxus/src/components/*",
    "host-dioxus/src/screens/*",
    "host-dioxus/src/vn/*",
]

# ---------------------------------------------------------------------------
# 函数/变异排除（正则匹配变异全名）
# ---------------------------------------------------------------------------
exclude_re = [
    # Display/Debug 格式化——变异只会测字符串输出细节，不反映逻辑正确性
    "impl .+Display",
    "impl .+Debug",

    # Diagnostic builder 方法——纯字段赋值，变异价值低
    "Diagnostic::(error|warn|info|with_line|with_detail|new)",

    # Default trait 实现——编译器/derive 行为
    "impl Default",

    # new() 构造函数如果只是设置默认值，变异意义不大
    "DiagnosticResult::new",
]

# ---------------------------------------------------------------------------
# 执行控制
# ---------------------------------------------------------------------------

# 使用专用 cargo profile，关闭 debug symbols 以缩短 mutants 编译时间。
profile = "mutants"

# 与 CI verify 对齐：仅运行 unit/integration tests，显式排除 doctest，
# 同时避免 `--all-targets` 额外拉入 examples/benches。
additional_cargo_test_args = ["--tests"]

# 单个变异测试的超时倍数（相对于基线测试时间）。
# 常规场景使用基线估算；CI 若需固定上限，改在命令行传 `--timeout`。
timeout_multiplier = 5.0

# 自动估算测试超时时的最小下限（秒）
minimum_test_timeout = 20
